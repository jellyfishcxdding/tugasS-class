<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../global.css">
  <style>
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding-top: 10px; }
    .item-card { background: white; padding: 12px; border-radius: 16px; text-align: center; border: 2px solid var(--border); cursor: pointer; }
    .item-card.active { border-color: var(--green); background: var(--green-light); }
  </style>
</head>
<body>
  <div class="grid">
    <div class="item-card" id="card-hat" onclick="buyOrEquip('hat', 0, 40)">
      <div style="font-size:30px">🎩</div>
      <div style="font-size:11px; font-weight:900;" id="lbl-hat">Top Hat (🪙 40)</div>
    </div>
    <div class="item-card" id="card-acc" onclick="buyOrEquip('acc', 0, 30)">
      <div style="font-size:30px">👓</div>
      <div style="font-size:11px; font-weight:900;" id="lbl-acc">Kacamata (🪙 30)</div>
    </div>
  </div>

  <script src="../script.js"></script>
  <script>
    function updateUI() {
      const cHat = document.getElementById('card-hat'); const lHat = document.getElementById('lbl-hat');
      const cAcc = document.getElementById('card-acc'); const lAcc = document.getElementById('lbl-acc');

      if (S.equipped.hat >= 0) { cHat.className = "item-card active"; lHat.textContent = "Dipakai ✓"; }
      else if (S.owned.hat.includes(0)) { cHat.className = "item-card"; lHat.textContent = "Milik Anda"; }

      if (S.equipped.acc >= 0) { cAcc.className = "item-card active"; lAcc.textContent = "Dipakai ✓"; }
      else if (S.owned.acc.includes(0)) { cAcc.className = "item-card"; lAcc.textContent = "Milik Anda"; }
    }

    function buyOrEquip(cat, idx, price) {
      if (!S.owned[cat].includes(idx)) {
        if (S.coins < price) { alert('Koin tidak cukup!'); return; }
        S.coins -= price;
        S.owned[cat].push(idx);
      }
      S.equipped[cat] = S.equipped[cat] === idx ? -1 : idx;
      saveState();
      updateUI();
      if(window.parent.reloadAvatarWrapper) window.parent.reloadAvatarWrapper();
    }

    document.addEventListener('DOMContentLoaded', updateUI);
  </script>
</body>
</html>
