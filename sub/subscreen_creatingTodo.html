<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tambah Tugas</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../global.css">
  <style>
    .form-box { background: var(--card); padding: 24px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.03); backdrop-filter: blur(10px); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 900; margin-bottom: 8px; color: var(--text); }
    .form-group input[type="text"], .form-group input[type="date"] { width: 100%; padding: 14px; border-radius: 16px; border: 1.5px solid var(--border); font-family: var(--font); font-size: 14px; background: #fbf9fa; outline: none; }
  </style>
</head>
<body>
<div class="phone">
  <div class="sbar"><span>9:41</span><span style="font-size:10px; font-weight:900;">TODOPLANT</span><span>⚡ 100%</span></div>
  <div class="scr" style="padding-top:10px;">
    <div class="topbar">
      <button class="tbadge" style="border:none;" onclick="window.location.href='../mainScreen.html'">← Batal</button>
      <h3 style="color:var(--text); font-size:15px; font-weight:900;">Tugas Baru</h3>
      <div style="width:60px;"></div>
    </div>
    <div class="form-box">
      <div class="form-group"><label>Judul Kegiatan</label><input type="text" id="task-name" placeholder="Contoh: Beli keperluan"></div>
      <div class="form-group"><label>Integrasi Jadwal</label><input type="date" id="task-date" value="2026-06-08"></div>
      <div class="form-group" style="display:flex; align-items:center; gap:10px; margin-top:10px;">
        <input type="checkbox" id="gcal-sync" style="width:20px; height:20px; accent-color:var(--green);">
        <label style="margin-bottom:0; cursor:pointer;" for="gcal-sync">Sync Google Calendar</label>
      </div>
      <button class="btn-add-main" style="width:100%; margin-top:16px;" onclick="submitTask()">Simpan Tugas</button>
    </div>
  </div>
</div>
<script src="../script.js"></script>
<script>
  function submitTask() {
    const txt = document.getElementById('task-name').value.trim();
    const dt = document.getElementById('task-date').value;
    const sync = document.getElementById('gcal-sync').checked;
    if (!txt) return;
    S.tasks.push({ id: Date.now(), text: txt, date: dt, done: false, gcal: sync });
    saveState(); window.location.href = '../mainScreen.html';
  }
</script>
</body>
</html>
