<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tambah Tugas</title>
  <link rel="stylesheet" href="../global.css">
  <style>
    .form-box { background: white; padding: 20px; border-radius: 20px; border: 1.5px solid var(--border); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 900; margin-bottom: 6px; color: var(--text); }
    .form-group input[type="text"], .form-group input[type="date"] {
      width: 100%; padding: 10px; border-radius: 12px; border: 1.5px solid var(--border); font-family: var(--font);
    }
  </style>
</head>
<body>
<div class="scr" style="padding-top:10px;">
  <div class="topbar">
    <button class="tbadge" onclick="window.location.href='../mainScreen.html'">← Batal</button>
    <h3 style="color:var(--text); font-size:14px;">Tugas Baru</h3>
  </div>

  <div class="form-box">
    <div class="form-group">
      <label>Nama Kegiatan</label>
      <input type="text" id="task-name" placeholder="Contoh: Belajar HCI">
    </div>
    
    <div class="form-group">
      <label>Hubungkan ke Kalender (Jadwal)</label>
      <input type="date" id="task-date" value="2026-06-08">
    </div>

    <div class="form-group" style="display:flex; align-items:center; gap:8px; padding-top:4px;">
      <input type="checkbox" id="gcal-sync" style="width:16px; height:16px;">
      <label style="margin-bottom:0; cursor:pointer;" for="gcal-sync">Sinkronisasi ke Google Calendar</label>
    </div>

    <button class="water-btn" style="background:var(--text); margin-top:10px;" onclick="submitTask()">Simpan ke List</button>
  </div>
</div>

<script src="../script.js"></script>
<script>
  function submitTask() {
    const txt = document.getElementById('task-name').value.trim();
    const dt = document.getElementById('task-date').value;
    const sync = document.getElementById('gcal-sync').checked;
    if (!txt) return;

    S.tasks.push({
      id: S.nextId++,
      text: txt,
      date: dt,
      done: false,
      gcal: sync
    });
    
    saveState();
    window.location.href = '../mainScreen.html';
  }
</script>
</body>
</html>
