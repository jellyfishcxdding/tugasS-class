<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../global.css">
</head>
<body>
<div class="phone">
  <div class="sbar"><span>9:41</span><span></span><span>⚡ 100%</span></div>
  <div class="scr" style="padding-top:10px;">
    
    <div class="topbar" style="display:flex; justify-content:space-between; align-items:center;">
      <button class="tbadge" style="border:none;" onclick="window.location.href='../mainScreen.html'">←</button>
      <div style="display:flex; gap:8px;">
        <select id="month-select" class="styled-select" onchange="renderCalendar()">
          <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
          <option value="3">Apr</option><option value="4">Mei</option><option value="5">Jun</option>
          <option value="6">Jul</option><option value="7">Agu</option><option value="8">Sep</option>
          <option value="9">Okt</option><option value="10">Nov</option><option value="11">Des</option>
        </select>
        <select id="year-select" class="styled-select" onchange="renderCalendar()">
          <script>
            const y = new Date().getFullYear();
            for(let i=0; i<10; i++) document.write(`<option value="${y+i}">${y+i}</option>`);
          </script>
        </select>
      </div>
      <div style="width:40px;"></div>
    </div>

    <div style="display: flex; justify-content: space-between; padding: 10px 16px; background: var(--card); border-radius: 20px; font-size: 12px; font-weight: 900; color: var(--brown);">
      <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
    </div>
    
    <div class="cal-grid" id="cal-grid"></div>
    
    <div id="agenda-box" style="margin-top:20px; background:var(--brown); color:white; padding:20px; border-radius:20px; font-weight:800; font-size:13px; min-height: 120px;">
      Pilih tanggal untuk melihat jadwal.
    </div>
  </div>
</div>

<script src="../script.js"></script>
<script>
  function renderCalendar() {
    const grid = document.getElementById('cal-grid');
    const m = parseInt(document.getElementById('month-select').value);
    const y = parseInt(document.getElementById('year-select').value);
    grid.innerHTML = '';
    
    const days = new Date(y, m + 1, 0).getDate();
    const start = new Date(y, m, 1).getDay();
    const offset = (start === 0) ? 6 : start - 1;
    
    for(let i=0; i<offset; i++) grid.innerHTML += `<div class="cal-day muted"></div>`;
    
    for(let i=1; i<=days; i++) {
      const dateStr = `${y}-${(m+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
      const has = S.tasks.some(t => t.gcal && t.date === dateStr) ? 'has-event' : '';
      grid.innerHTML += `<div class="cal-day ${has}" onclick="selectDate('${dateStr}', this)">${i}</div>`;
    }
  }
  
  function selectDate(d, el) {
    document.querySelectorAll('.cal-day').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    const box = document.getElementById('agenda-box');
    const tasks = S.tasks.filter(t => t.gcal && t.date === d);
    box.innerHTML = tasks.length ? `Jadwal ${d}:<ul style="padding-left:20px; margin-top:10px; line-height:1.6;">` + tasks.map(t => `<li style="${t.done ? 'text-decoration:line-through; opacity:0.7;' : ''}">${t.text}</li>`).join('') + `</ul>` : '<div style="text-align:center; padding-top:20px;">Tidak ada agenda.</div>';
  }

  document.addEventListener('DOMContentLoaded', () => { 
    document.getElementById('month-select').value = new Date().getMonth();
    renderCalendar(); 
  });
</script>
</body>
</html>
