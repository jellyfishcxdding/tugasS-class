<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodoPlant - Main</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
</head>
<body>
<div class="phone">
  <div class="sbar">
    <span>9:41</span>
    <span style="font-size:10px; font-weight:900;">TODOPLANT</span>
    <span>⚡ 100%</span>
  </div>
  
  <div class="toast" id="toast"></div>

  <div class="scr">
    <div class="topbar" style="justify-content: space-between; gap: 10px;">
      <button class="tbadge" style="border:none;" onclick="window.location.href='../mainScreen.html'">← Menu</button>
      
      <div style="display: flex; gap: 5px;">
        <select id="month-select" onchange="renderCalendar()" style="padding:8px; border-radius:15px; font-weight:900; border:2px solid var(--border); font-family:var(--font);">
          <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
          <option value="3">Apr</option><option value="4">Mei</option><option value="5">Jun</option>
          <option value="6">Jul</option><option value="7">Agu</option><option value="8">Sep</option>
          <option value="9">Okt</option><option value="10">Nov</option><option value="11">Des</option>
        </select>
        
        <select id="year-select" onchange="renderCalendar()" style="padding:8px; border-radius:15px; font-weight:900; border:2px solid var(--border); font-family:var(--font);">
          <script>
            const currentYear = new Date().getFullYear();
            for(let i=0; i<10; i++) document.write(`<option value="${currentYear+i}">${currentYear+i}</option>`);
          </script>
        </select>
      </div>
    </div>

    <div class="avatar-box">
      <svg class="avatar-svg" id="avatar-main" viewBox="0 0 110 180" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="plant-btn-sm" onclick="goTo('Todoplant.html')">
        <div style="font-size:24px">🌱</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab on">To Do List</div>
      <div class="tab" onclick="goTo('sub/subscreen_task.html')">Task</div>
      <div class="tab" onclick="goTo('sub/subscreen_agenda.html')">Agenda</div>
    </div>

    <div class="task-scroll" id="task-list"></div>

    <button class="btn-add-main" onclick="goTo('sub/subscreen_creatingTodo.html')">+ Tambah Tugas Baru</button>
  </div>
</div>

<script src="script.js"></script>
<script>

  document.addEventListener('DOMContentLoaded', () => {
    renderAvatar('avatar-main');
    syncGlobalStats();
   
    if(typeof renderTasks === 'function') renderTasks();
  });
</script>
</body>
</html>
