<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../global.css">
  <style>
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding-top: 10px; }
    .item-card { background: white; padding: 12px; border-radius: 16px; text-align: center; border: 2px solid var(--border); cursor: pointer; }
    .item-card.active { border-color: var(--green); background: var(--green-light); }
  </style>
</head>
<body>
  <div class="grid">
    <div class="item-card" id="card-0" onclick="buyOrEquip('shoes', 0, 0)">
      <div style="font-size:30px">👟</div>
      <div style="font-size:11px; font-weight:900;" id="lbl-0">Sneakers (Owned)</div>
    </div>
    <div class="item-card" id="card-1" onclick="buyOrEquip('shoes', 1, 50)">
      <div style="font-size:30px">👠</div>
      <div style="font-size:11px; font-weight:900;" id="lbl-1">Heels (🪙 50)</div>
    </div>
  </div>

  <script src="../script.js"></script>
  <script>
    function updateUI() {
      [0, 1].forEach(idx => {
        const card = document.getElementById('card-' + idx);
        const lbl = document.getElementById('lbl-' + idx);
        if (S.equipped.shoes === idx) {
          card.className = "item-card active";
          lbl.textContent = "Dipakai ✓";
        } else if (S.owned.shoes.includes(idx)) {
          card.className = "item-card";
          lbl.textContent = "Milik Anda";
        }
      });
    }

    function buyOrEquip(cat, idx, price) {
      if (!S.owned[cat].includes(idx)) {
        if (S.coins < price) { alert('Koin tidak cukup!'); return; }
        S.coins -= price;
        S.owned[cat].push(idx);
      }
      S.equipped[cat] = S.equipped[cat] === idx ? -1 : idx;
      saveState();
      updateUI();
      if(window.parent.reloadAvatarWrapper) window.parent.reloadAvatarWrapper();
    }

    document.addEventListener('DOMContentLoaded', updateUI);
  </script>
</body>
</html>
